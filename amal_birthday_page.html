<!DOCTYPE html>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Tajawal', sans-serif;
    direction: rtl;
    background: #0a0015;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  canvas#stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .page {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 60px 20px 80px;
    gap: 40px;
  }

  /* Floating confetti */
  .confetti-wrap {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
    overflow: hidden;
  }

  .conf {
    position: absolute;
    top: -30px;
    width: 10px;
    height: 14px;
    border-radius: 2px;
    opacity: 0.85;
    animation: fall linear infinite;
  }

  @keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 0.85; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Hero section */
  .hero {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .balloon-row {
    display: flex;
    gap: 12px;
    font-size: 42px;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 0 12px rgba(255,100,200,0.6));
  }

  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-12px); }
  }

  .name {
    font-size: clamp(52px, 12vw, 88px);
    font-weight: 900;
    letter-spacing: -1px;
    background: linear-gradient(135deg, #ff6ec7, #ffd700, #ff6ec7, #c77dff);
    background-size: 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
    line-height: 1.1;
    text-shadow: none;
  }

  @keyframes shimmer {
    0% { background-position: 0% 50%; }
    100% { background-position: 300% 50%; }
  }

  .subtitle {
    font-size: clamp(18px, 4vw, 26px);
    color: #f0c8ff;
    font-weight: 700;
    letter-spacing: 2px;
    opacity: 0.9;
    text-shadow: 0 0 20px rgba(200,100,255,0.5);
  }

  /* Cake */
  .cake-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .cake {
    font-size: 90px;
    animation: pulse 2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(255,200,0,0.7));
  }

  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }

  /* Wish card */
  .wish-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,100,200,0.3);
    border-radius: 24px;
    padding: 32px 40px;
    max-width: 560px;
    width: 100%;
    text-align: center;
    backdrop-filter: blur(12px);
    position: relative;
    overflow: hidden;
  }

  .wish-card::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    border-radius: 26px;
    background: linear-gradient(135deg, #ff6ec7, #c77dff, #ffd700, #ff6ec7);
    background-size: 300%;
    animation: shimmer 4s linear infinite;
    z-index: -1;
    opacity: 0.4;
  }

  .wish-text {
    font-size: clamp(17px, 3.5vw, 22px);
    color: #fdf0ff;
    line-height: 2;
    font-weight: 400;
  }

  .wish-text strong {
    color: #ffd700;
    font-weight: 700;
  }

  /* Stars decoration */
  .deco-stars {
    font-size: 28px;
    margin-bottom: 10px;
    letter-spacing: 6px;
  }

  /* Number badge */
  .age-badge {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(255,200,0,0.12);
    border: 1.5px solid rgba(255,200,0,0.4);
    border-radius: 999px;
    padding: 14px 36px;
    backdrop-filter: blur(8px);
  }

  .age-number {
    font-size: 40px;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.6);
  }

  .age-label {
    font-size: 20px;
    color: #fdf0ff;
    font-weight: 700;
  }

  /* Gift row */
  .gift-row {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .gift-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 18px;
    padding: 20px 28px;
    min-width: 110px;
    backdrop-filter: blur(8px);
    transition: transform 0.3s;
  }

  .gift-item:hover { transform: translateY(-6px) scale(1.04); }

  .gift-icon { font-size: 36px; }

  .gift-label {
    font-size: 14px;
    color: #e8c4ff;
    font-weight: 700;
  }

  /* Footer */
  .footer-text {
    color: rgba(255,255,255,0.35);
    font-size: 14px;
    text-align: center;
  }

  /* Sparkle button */
  .sparkle-btn {
    background: linear-gradient(135deg, #ff6ec7, #c77dff);
    border: none;
    border-radius: 999px;
    color: white;
    font-family: 'Tajawal', sans-serif;
    font-size: 18px;
    font-weight: 700;
    padding: 14px 40px;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(255,110,200,0.4);
  }

  .sparkle-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 36px rgba(255,110,200,0.6);
  }

  .sparkle-btn:active { transform: scale(0.97); }

  /* Fireworks */
  .firework {
    position: fixed;
    pointer-events: none;
    z-index: 999;
    animation: explode 1s forwards;
    font-size: 28px;
  }

  @keyframes explode {
    0% { opacity: 1; transform: scale(0.3); }
    50% { opacity: 1; transform: scale(1.4); }
    100% { opacity: 0; transform: scale(0.8) translateY(-40px); }
  }
</style>

<canvas id="stars"></canvas>

<div class="confetti-wrap" id="confetti"></div>

<div class="page" dir="rtl">

  <div class="hero">
    <div class="balloon-row">🎈🎀🎈</div>
    <div class="name">أمال</div>
    <div class="subtitle">✨ كل عام وأنتِ بخير ✨</div>
  </div>

  <div class="cake-section">
    <div class="cake">🎂</div>
  </div>

  <div class="wish-card">
    <div class="deco-stars">⭐ 🌟 ✨ 🌟 ⭐</div>
    <p class="wish-text">
      في يوم ميلادك الجميل،<br>
      نتمنى لكِ <strong>صحةً وسعادةً</strong> لا تنتهي 💖<br>
      وأن يكون هذا العام مليئاً بـ<strong>النجاحات</strong> 🌟<br>
      والأحلام التي تتحقق واحداً تلو الآخر 🌙<br>
      <strong>عيد ميلاد سعيد يا أمال!</strong> 🎉
    </p>
  </div>

  <div class="gift-row">
    <div class="gift-item">
      <span class="gift-icon">🌹</span>
      <span class="gift-label">الحب</span>
    </div>
    <div class="gift-item">
      <span class="gift-icon">⭐</span>
      <span class="gift-label">النجاح</span>
    </div>
    <div class="gift-item">
      <span class="gift-icon">🌈</span>
      <span class="gift-label">الفرح</span>
    </div>
    <div class="gift-item">
      <span class="gift-icon">💎</span>
      <span class="gift-label">الصحة</span>
    </div>
    <div class="gift-item">
      <span class="gift-icon">🕊️</span>
      <span class="gift-label">السلام</span>
    </div>
  </div>

  <button class="sparkle-btn" onclick="launchFireworks()">🎆 اضغطي للاحتفال!</button>

  <p class="footer-text">يوم ميلادك يوم سعيد 🎊</p>
</div>

<script>
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 180; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() * 1.8 + 0.3,
        a: Math.random(),
        speed: Math.random() * 0.008 + 0.003,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const alpha = 0.3 + 0.7 * Math.abs(Math.sin(t * s.speed + s.phase));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(255,255,255,${alpha})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  resize();
  initStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
  requestAnimationFrame(drawStars);

  const colors = ['#ff6ec7','#ffd700','#c77dff','#ff9a9e','#a1c4fd','#fd79a8','#fdcb6e'];
  const wrap = document.getElementById('confetti');

  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'conf';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.width = (8 + Math.random() * 8) + 'px';
    c.style.height = (10 + Math.random() * 10) + 'px';
    c.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.style.animationDuration = (4 + Math.random() * 8) + 's';
    c.style.animationDelay = (Math.random() * 8) + 's';
    wrap.appendChild(c);
  }

  function launchFireworks() {
    const emojis = ['🎆','🎇','✨','🌟','💥','🎊','🎉'];
    for (let i = 0; i < 14; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'firework';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = (10 + Math.random() * 80) + 'vw';
        el.style.top = (10 + Math.random() * 70) + 'vh';
        el.style.fontSize = (24 + Math.random() * 30) + 'px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1000);
      }, i * 80);
    }
  }
</script>
